name: Build Kernel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc

      - name: Build Kernel, Modules and Headers
        run: |
          mkdir -p ./out
          make olddefconfig
          make -j$(nproc)
          # تثبيت الموديولات
          make modules_install INSTALL_MOD_PATH=./out
          # تثبيت الهيدرز
          make headers_install INSTALL_HDR_PATH=./out/usr
          # نسخ الملفات الأساسية
          cp arch/x86/boot/bzImage ./out/
          cp System.map ./out/
          # ضغط الموديولات
          tar -czf ./out/modules.tar.gz -C ./out lib/modules

      - name: Prepare Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-full-package
          path: ./out/
