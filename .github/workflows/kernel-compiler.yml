name: Linux Kernel Compiler

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc ccache devscripts debhelper rsync

    - name: Download and Extract Kernel Source
      run: |
        wget https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.12.86.tar.xz
        tar -xf linux-6.12.86.tar.xz
        # نقل ملف الكونفيج الذي رفعته أنت إلى داخل مجلد النواة المستخرجة مباشرة
        cp .config linux-6.12.86/.config

    - name: Prepare and Fix Configuration
      run: |
        cd linux-6.12.86
        # إصلاح خطأ التوقيع الرقمي الشهير لكي لا يتوقف البناء
        scripts/config --disable SYSTEM_TRUSTED_KEYS
        scripts/config --disable SYSTEM_REVOCATION_KEYS
        # تطبيق الكونفيج واعتماد الخيارات الافتراضية لأي ميزة جديدة
        make olddefconfig

    - name: Compile Kernel (Turbo Mode)
      run: |
        cd linux-6.12.86
        # الطبخ وحزم النواة مباشرة بصيغة .deb متوافقة مع ديبيان
        make -j$(nproc) bindeb-pkg

    - name: Organize Artifacts
      run: |
        mkdir output
        # تجميع ملفات الـ .deb الناتجة من المجلد الأب ونقلها للمخرجات
        mv ../*.deb output/ 2>/dev/null || mv linux-6.12.86/../*.deb output/ || true

    - name: Upload Compiled Kernel
      uses: actions/upload-artifact@v4
      with:
        name: custom-debian-kernel
        path: output/
