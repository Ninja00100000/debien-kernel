name: Build Gentoo Kernel

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc dwarves

      - name: Download and Extract Kernel
        run: |
          wget https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.18.38.tar.xz
          tar -xf linux-6.18.38.tar.xz
          mv linux-6.18.38 linux

      - name: Setup Configuration
        run: |
          cp .config linux/.config
          cd linux
          make olddefconfig

      - name: Build Kernel and Headers
        run: |
          cd linux
          make -j$(nproc)
          make headers_install INSTALL_HDR_PATH=./kernel-headers

      - name: Prepare Artifacts
        run: |
          cd linux
          tar -czf kernel-headers.tar.gz -C kernel-headers .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-packages
          path: |
            linux/arch/x86/boot/bzImage
            linux/System.map
            linux/.config
            linux/kernel-headers.tar.gz
