name: Linux Kernel Compiler

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc ccache devscripts debhelper rsync

    - name: Download and Extract Kernel Source
      run: |
        # تحميل وفك ضغط النواة
        wget https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.12.86.tar.xz
        tar -xf linux-6.12.86.tar.xz
        
        # البحث عن الملف المخفي ونقله مباشرة مهما كان مساره الحالي في السيرفر
        find . -name ".config" -exec cp {} linux-6.12.86/.config \;

    - name: Prepare and Fix Configuration
      run: |
        cd linux-6.12.86
        # إيقاف التواقيع الرقمية التي تفشل البناء دائماً
        scripts/config --disable SYSTEM_TRUSTED_KEYS
        scripts/config --disable SYSTEM_REVOCATION_KEYS
        # تطبيق الكونفيج
        make olddefconfig

    - name: Compile Kernel
      run: |
        cd linux-6.12.86
        # بناء الحزم
        make -j$(nproc) bindeb-pkg

    - name: Organize Artifacts
      run: |
        mkdir -p output
        find . -maxdepth 2 -name "*.deb" -exec mv {} output/ \;

    - name: Upload Compiled Kernel
      uses: actions/upload-artifact@v4
      with:
        name: custom-debian-kernel
        path: output/
