name: Linux Kernel Compiler

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc ccache devscripts debhelper rsync

    - name: Download and Extract Kernel Source
      run: |
        wget https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.12.86.tar.xz
        tar -xf linux-6.12.86.tar.xz
        cp "$GITHUB_WORKSPACE/.config" linux-6.12.86/.config

    - name: Prepare and Fix Configuration
      run: |
        cd linux-6.12.86
        scripts/config --disable SYSTEM_TRUSTED_KEYS
        scripts/config --disable SYSTEM_REVOCATION_KEYS
        # إجبار الكونفيج على تفعيل خيار بناء الـ Headers مع النواة
        scripts/config --enable CONFIG_HEADERS_INSTALL
        make olddefconfig

    - name: Compile Kernel (Full Debian Packages)
      run: |
        cd linux-6.12.86
        # استخدام الخيار الشامل لبناء حزم النواة والـ Headers معاً
        make -j$(nproc) bindeb-pkg KDEB_PKGVERSION=1.custom

    - name: Organize Artifacts
      run: |
        mkdir -p output
        # تجميع كافة ملفات الـ .deb الناتجة من المجلد الأب ونقلها
        find .. -maxdepth 1 -name "*.deb" -exec mv {} output/ \;

    - name: Upload Compiled Kernel
      uses: actions/upload-artifact@v4
      with:
        name: custom-debian-kernel
        path: output/
